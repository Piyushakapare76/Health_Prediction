<!DOCTYPE html>
<html>
<head>

   

<!DOCTYPE html>

<html lang="en">
<head>


<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Patient</title>

<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<style>

    body{
        background-color:#f4f7fc;
    }

    .card{
        border-radius:15px;
    }

    h2{
        font-weight:bold;
    }

</style>


</head>

<body>

<!-- Flash Message Popup -->

{% with messages = get_flashed_messages() %}
{% if messages %} <script>
{% for message in messages %}
alert("{{ message }}");
{% endfor %} </script>
{% endif %}
{% endwith %}

<div class="container mt-5">

```
<div class="card shadow p-4">

    <!-- Back Button -->
    <div class="mb-3">
        <a href="/" class="btn btn-secondary">
            ← Back to Dashboard
        </a>
    </div>

    <h2 class="text-center text-primary mb-4">
        Add Patient
    </h2>

    <form action="/insert" method="POST">

        <div class="mb-3">
            <label class="form-label">
                Full Name
            </label>

            <input type="text"
                   name="full_name"
                   class="form-control"
                   placeholder="Enter Full Name"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">
                Date of Birth
            </label>

            <input type="date"
                   name="dob"
                   class="form-control"
                   max="{{ today }}"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">
                Email Address
            </label>

            <input type="email"
                   name="email"
                   class="form-control"
                   placeholder="Enter Email Address"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">
                Glucose
            </label>

            <input type="number"
                   step="any"
                   name="glucose"
                   class="form-control"
                   placeholder="Enter Glucose Value"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">
                Haemoglobin
            </label>

            <input type="number"
                   step="any"
                   name="haemoglobin"
                   class="form-control"
                   placeholder="Enter Haemoglobin Value"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">
                Cholesterol
            </label>

            <input type="number"
                   step="any"
                   name="cholesterol"
                   class="form-control"
                   placeholder="Enter Cholesterol Value"
                   required>
        </div>

        <button type="submit"
                class="btn btn-primary w-100">
            Submit Patient Details
        </button>

    </form>

</div>


</div>

</body>
</html>



</div>

</body>
</html>

</body>
</html>
