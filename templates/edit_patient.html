<!DOCTYPE html>
<html>

<head>

    <title>Edit Patient</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center text-primary">
            Edit Patient
        </h2>

        <form action="/update/{{ patient[0] }}" method="POST">

            <input type="text"
            name="full_name"
            value="{{ patient[1] }}"
            class="form-control mb-3"
            required>

            <input type="date"
            name="dob"
            value="{{ patient[2] }}"
            class="form-control mb-3"
            required>

            <input type="email"
            name="email"
            value="{{ patient[3] }}"
            class="form-control mb-3"
            required>

            <input type="number"
            step="any"
            name="glucose"
            value="{{ patient[4] }}"
            class="form-control mb-3"
            required>

            <input type="number"
            step="any"
            name="haemoglobin"
            value="{{ patient[5] }}"
            class="form-control mb-3"
            required>

            <input type="number"
            step="any"
            name="cholesterol"
            value="{{ patient[6] }}"
            class="form-control mb-3"
            required>

            <button class="btn btn-primary w-100">
                Update Patient
            </button>

        </form>

    </div>

</div>

</body>
</html>
